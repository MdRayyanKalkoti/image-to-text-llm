services:
  - type: web
    name: image-to-text-llm
    runtime: python
    buildCommand: pip install -r requirements.txt && python postinstall.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
